name: Render PDF Previews

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pymupdf

      - name: Render previews
        run: |
          mkdir -p previews
          python - << 'PY'
          import fitz
          from pathlib import Path

          for pdf in Path("data/pdf").glob("*.pdf"):
              try:
                  doc = fitz.open(pdf)
                  outdir = Path("previews") / pdf.stem
                  outdir.mkdir(parents=True, exist_ok=True)

                  for i in range(min(2, len(doc))):
                      page = doc[i]
                      pix = page.get_pixmap(matrix=fitz.Matrix(2, 2))
                      pix.save(outdir / f"page_{i+1}.png")

                      text = page.get_text("text")
                      (outdir / f"page_{i+1}.txt").write_text(text, encoding="utf-8")

                  print("OK", pdf.name)
              except Exception as e:
                  print("ERR", pdf.name, e)
          PY

      - name: Commit previews
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add previews
          git commit -m "Render PDF previews" || echo "No changes"
          git push
